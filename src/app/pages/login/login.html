<div class="login-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card shadow-lg rounded-4 overflow-hidden">
    <div class="login-panel d-flex flex-column flex-md-row">
      <div
        class="login-panel__hero d-flex flex-column justify-content-center text-white p-4 p-md-5"
      >
        <div>
          <h2>Welcome Back</h2>
          <p class="text-white-75">
            Sign in to your enquiry portal and manage leads, tickets, and customer requests in one
            place.
          </p>
        </div>
        <div class="mt-4 login-hero__decor"></div>
      </div>

      <div class="login-panel__form bg-white p-4 p-md-5">
        <div class="mb-4 text-center">
          <span class="badge bg-primary text-uppercase px-3 py-2 mb-3">Secure login</span>
          <h3 class="mb-2">Sign in to continue</h3>
          <p class="text-muted mb-0">
            Enter your email and password to access the enquiry dashboard.
          </p>
        </div>

        <form>
          <div class="mb-3">
            <label for="loginEmail" class="form-label">User Name</label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="loginEmail"
              placeholder="John Doe"
              [(ngModel)]="loginObj.username"
              name="username"
            />
          </div>

          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              id="loginPassword"
              placeholder="Enter your password"
              [(ngModel)]="loginObj.password"
              name="password"
            />
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100" (click)="attemptLogin()">Log in</button>
        </form>

        <div class="text-center mt-4 text-muted small">
          New here? <a href="#" class="text-decoration-none">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>
